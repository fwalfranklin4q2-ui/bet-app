name: Fetch Odds Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: 写入数据
        run: |
          mkdir -p data
          echo '{
            "updated_at": "'$(date)'",
            "matches": [
              {
                "id": "2006",
                "home": "博卡青年",
                "away": "巴塞罗那",
                "league": "解放者杯",
                "homeOdds": 1.26,
                "drawOdds": 4.40,
                "awayOdds": 9.30
              },
              {
                "id": "2007",
                "home": "基多大学",
                "away": "米拉索尔",
                "league": "解放者杯",
                "homeOdds": 1.69,
                "drawOdds": 3.40,
                "awayOdds": 4.10
              }
            ]
          }' > data/odds.json

      - name: 提交
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add data/odds.json
          git commit -m "update odds" || echo "no change"
          git push
