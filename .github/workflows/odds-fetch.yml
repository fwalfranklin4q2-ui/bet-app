name: Fetch Odds Data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v3

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: pip install requests

      - name: 执行抓取脚本
        run: python scripts/fetch_odds.py

      - name: 提交数据更新
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add data/odds.json
          git commit -m "update odds data" || echo "no changes"
          git push
