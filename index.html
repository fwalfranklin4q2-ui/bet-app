<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>投注助手 V16（高级UI版）</title>
<style>
  :root{
    --bg:#07101d;
    --bg2:#0b1220;
    --panel:#111a2e;
    --panel2:#16233b;
    --panel3:#0e1729;
    --line:#223252;
    --text:#ffffff;
    --muted:#9ca3af;
    --green:#4ade80;
    --yellow:#facc15;
    --red:#f87171;
    --blue:#60a5fa;
    --purple:#8b5cf6;
    --cyan:#22d3ee;
    --shadow:0 10px 28px rgba(0,0,0,.22);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif;
  }
  .app{
    max-width:430px;
    margin:0 auto;
    padding:14px 14px 100px;
  }
  .hero{
    background:linear-gradient(135deg,rgba(96,165,250,.20),rgba(139,92,246,.18),rgba(34,211,238,.10));
    border:1px solid rgba(255,255,255,.06);
    border-radius:24px;
    padding:18px 16px;
    margin-bottom:14px;
    box-shadow:var(--shadow);
    overflow:hidden;
    position:relative;
  }
  .hero::after{
    content:"";
    position:absolute;
    right:-30px;
    top:-20px;
    width:120px;
    height:120px;
    background:rgba(255,255,255,.05);
    border-radius:50%;
  }
  .hero-title{
    font-size:28px;
    font-weight:900;
    line-height:1.15;
    margin:0 0 8px;
    letter-spacing:.3px;
  }
  .hero-sub{
    color:#d6def0;
    font-size:13px;
    line-height:1.55;
  }
  .hero-pills{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:12px;
  }
  .pill{
    padding:7px 11px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    background:rgba(255,255,255,.10);
    color:#eef4ff;
    backdrop-filter:blur(6px);
  }
  .card{
    background:linear-gradient(180deg,var(--panel) 0%,#0f1729 100%);
    border:1px solid rgba(255,255,255,.05);
    border-radius:22px;
    padding:16px;
    margin-bottom:14px;
    box-shadow:var(--shadow);
  }
  .section-title{
    font-size:20px;
    font-weight:900;
    margin:0 0 8px;
    line-height:1.2;
  }
  .section-sub{
    color:var(--muted);
    font-size:13px;
    line-height:1.5;
    margin-bottom:10px;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .kpi{
    background:linear-gradient(180deg,var(--panel2) 0%,#101b33 100%);
    border-radius:18px;
    padding:14px 12px;
    position:relative;
    overflow:hidden;
  }
  .kpi::after{
    content:"";
    position:absolute;
    right:-20px;
    top:-20px;
    width:78px;
    height:78px;
    background:rgba(255,255,255,.04);
    border-radius:50%;
  }
  .kpi-v{
    font-size:24px;
    font-weight:900;
    line-height:1;
  }
  .kpi-l{
    margin-top:7px;
    font-size:12px;
    color:var(--muted);
  }
  .input,.textarea,.select{
    width:100%;
    border:none;
    border-radius:16px;
    padding:14px;
    font-size:16px;
    background:#f3f4f6;
    color:#111827;
    margin-top:8px;
  }
  .textarea{
    min-height:120px;
    resize:vertical;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  .btn{
    width:100%;
    margin-top:10px;
    border:none;
    border-radius:16px;
    padding:14px;
    font-size:15px;
    font-weight:900;
    color:#fff;
    background:linear-gradient(90deg,#5977ff,#8a5cff);
  }
  .btn.secondary{background:linear-gradient(90deg,#334155,#3f4d61)}
  .btn.blue{background:linear-gradient(90deg,#1d4ed8,#2563eb)}
  .btn.green{background:linear-gradient(90deg,#166534,#16a34a)}
  .btn.red{background:linear-gradient(90deg,#7f1d1d,#dc2626)}
  .rowBtns{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:10px;
  }
  .core-card{
    background:linear-gradient(135deg,rgba(74,124,255,.18),rgba(139,92,246,.12));
    border:1px solid rgba(123,92,255,.24);
    border-radius:18px;
    padding:14px;
    margin-top:8px;
  }
  .core-title{
    font-size:15px;
    font-weight:900;
    margin-bottom:8px;
  }
  .small{
    color:var(--muted);
    font-size:13px;
    line-height:1.5;
  }
  .divider{
    height:1px;
    background:var(--line);
    margin:10px 0;
  }
  .chip{
    display:inline-block;
    padding:8px 12px;
    border-radius:999px;
    font-size:13px;
    margin:4px 6px 0 0;
    background:rgba(96,165,250,.12);
    color:#c7d9ff;
    border:1px solid transparent;
  }
  .chip.active{
    border-color:var(--green);
    color:#fff;
    background:rgba(74,222,128,.12);
  }
  .match{
    background:linear-gradient(180deg,var(--panel3) 0%,#0f182d 100%);
    border:1px solid rgba(255,255,255,.04);
    border-radius:20px;
    padding:14px;
    margin-top:10px;
  }
  .match-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .match-id{
    font-size:12px;
    color:var(--cyan);
    margin-bottom:4px;
    font-weight:800;
    letter-spacing:.3px;
  }
  .match-name{
    font-size:18px;
    font-weight:900;
    line-height:1.35;
  }
  .match-league{
    font-size:12px;
    color:var(--muted);
    margin-top:4px;
  }
  .tag{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:900;
    white-space:nowrap;
  }
  .t-green{background:rgba(74,222,128,.15);color:var(--green)}
  .t-yellow{background:rgba(250,204,21,.15);color:var(--yellow)}
  .t-red{background:rgba(248,113,113,.15);color:var(--red)}
  .t-blue{background:rgba(96,165,250,.15);color:var(--blue)}
  .odds-row{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin-top:10px;
  }
  .odds-box{
    background:#101b31;
    border-radius:14px;
    padding:10px 8px;
    text-align:center;
  }
  .odds-box b{
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-bottom:4px;
  }
  .odds-box span{
    font-size:18px;
    font-weight:900;
  }
  .archiveItem{
    background:var(--panel3);
    border-radius:14px;
    padding:12px;
    margin-top:8px;
  }
  .ok{color:var(--green)}
  .warn{color:var(--yellow)}
  .danger{color:var(--red)}
  .bottom-nav{
    position:fixed;
    left:50%;
    transform:translateX(-50%);
    bottom:12px;
    width:min(430px,calc(100% - 18px));
    background:rgba(10,16,29,.93);
    border:1px solid rgba(255,255,255,.06);
    border-radius:24px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    padding:8px 6px;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,.28);
  }
  .nav-item{
    text-align:center;
    color:var(--muted);
    font-size:11px;
    padding:6px 0;
  }
  .nav-item b{
    display:block;
    font-size:18px;
    margin-bottom:4px;
  }
  .nav-item.active{
    color:#fff;
  }
</style>
</head>
<body>
<div class="app">

  <div class="hero">
    <div class="hero-title">🔥 投注助手 V16</div>
    <div class="hero-sub">高级 UI 版｜自动赔率｜每日比赛池｜自动分析｜防庄识别｜归档与盈亏面板</div>
    <div class="hero-pills">
      <div class="pill">自动读取赔率</div>
      <div class="pill">主线/防守分层</div>
      <div class="pill">比赛日归档</div>
      <div class="pill">盈亏统计</div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">今日总览</div>
    <div class="grid">
      <div class="kpi"><div class="kpi-v" id="kpiBudget">200</div><div class="kpi-l">总预算</div></div>
      <div class="kpi"><div class="kpi-v" id="kpiUpdated">--</div><div class="kpi-l">更新时间</div></div>
      <div class="kpi"><div class="kpi-v" id="kpiMainCount">0</div><div class="kpi-l">主线场数</div></div>
      <div class="kpi"><div class="kpi-v" id="kpiWarnCount">0</div><div class="kpi-l">风险提示</div></div>
      <div class="kpi"><div class="kpi-v" id="kpiProfit">0</div><div class="kpi-l">累计盈亏</div></div>
      <div class="kpi"><div class="kpi-v" id="kpiRate">0%</div><div class="kpi-l">命中率</div></div>
    </div>

    <div class="core-card">
      <div class="core-title">🎯 今日核心判断</div>
      <div id="overview">等待分析...</div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">参数与状态</div>
    <input id="budget" class="input" type="number" value="200" placeholder="总预算">
    <input id="singleMatch" class="input" type="text" value="2006" placeholder="利润单关场编号">
    <input id="dayLabel" class="input" type="text" value="" placeholder="比赛日标签，例如 2026-04-15 晚场">
    <button class="btn" onclick="loadData()">立即读取后台数据</button>
    <div class="small" id="status" style="margin-top:8px;">加载中...</div>
  </div>

  <div class="card">
    <div class="section-title">今日比赛池</div>
    <div class="section-sub">点标签勾选今天真正要分析的比赛</div>
    <div id="poolChips">等待加载...</div>
    <button class="btn blue" onclick="selectAllMatches()">全选今日比赛</button>
    <button class="btn secondary" onclick="clearSelectedMatches()">清空今日比赛</button>
  </div>

  <div class="card">
    <div class="section-title">补录比赛</div>
    <textarea id="manualMatches" class="textarea" placeholder='粘贴 JSON 数组'></textarea>
    <button class="btn" onclick="mergeManualMatches()">合并到今日比赛池</button>
    <button class="btn secondary" onclick="loadSavedManualMatches()">读取今日补录</button>
    <button class="btn red" onclick="clearSavedManualMatches()">清空今日补录</button>
  </div>

  <div class="card">
    <div class="section-title">实战建议</div>
    <div id="bets">等待分析...</div>
  </div>

  <div class="card">
    <div class="section-title">风控面板</div>
    <div id="riskPanel">等待分析...</div>
    <div class="rowBtns">
      <button class="btn green" onclick="markLastBet('win')">最近一单：红了</button>
      <button class="btn red" onclick="markLastBet('loss')">最近一单：黑了</button>
    </div>
    <button class="btn secondary" onclick="resetStats()">重置统计</button>
  </div>

  <div class="card">
    <div class="section-title">比赛分析</div>
    <div id="matches">等待分析...</div>
  </div>

  <div class="card">
    <div class="section-title">归档中心</div>
    <button class="btn green" onclick="saveArchive()">保存今日方案归档</button>
    <select id="archiveSelect" class="select" onchange="loadArchive()">
      <option value="">选择历史比赛日</option>
    </select>
    <div id="archiveView" class="small" style="margin-top:10px;">暂无归档</div>
  </div>

</div>

<div class="bottom-nav">
  <div class="nav-item active"><b>🏠</b>首页</div>
  <div class="nav-item"><b>📋</b>比赛</div>
  <div class="nav-item"><b>🛡</b>风控</div>
  <div class="nav-item"><b>🗂</b>归档</div>
</div>

<script>
let backendMatches = [];
let manualMatches = [];
let currentMatches = [];
let selectedMatchIds = [];
let lastSnapshot = JSON.parse(localStorage.getItem('betapp_odds_snapshot') || '{}');
let stats = JSON.parse(localStorage.getItem('betapp_stats') || '{"win":0,"loss":0,"streak":0}');
let profitBook = JSON.parse(localStorage.getItem('betapp_profit_book') || '[]');

function dayKey(){
  return document.getElementById('dayLabel').value.trim() || 'default-day';
}
function manualKey(){ return 'betapp_manual_matches_' + dayKey(); }
function selectedKey(){ return 'betapp_selected_ids_' + dayKey(); }
function archiveListKey(){ return 'betapp_archive_list'; }
function archiveKey(label){ return 'betapp_archive_' + label; }

function saveStats(){
  localStorage.setItem('betapp_stats', JSON.stringify(stats));
  renderRiskPanel();
  renderTopStats();
  analyze();
}
function markLastBet(type){
  if(type === 'win'){
    stats.win += 1;
    stats.streak = 0;
  }else{
    stats.loss += 1;
    stats.streak += 1;
  }
  saveStats();
}
function resetStats(){
  stats = {win:0, loss:0, streak:0};
  saveStats();
}

function renderTopStats(mainCount=0,warnCount=0){
  const total = stats.win + stats.loss;
  const rate = total ? Math.round((stats.win / total) * 100) : 0;
  const totalProfit = profitBook.reduce((s,x)=>s+x.amount,0);
  document.getElementById('kpiBudget').textContent = document.getElementById('budget').value || 200;
  document.getElementById('kpiRate').textContent = rate + '%';
  document.getElementById('kpiProfit').textContent = totalProfit;
  document.getElementById('kpiMainCount').textContent = mainCount;
  document.getElementById('kpiWarnCount').textContent = warnCount;
}
function renderRiskPanel(){
  const total = stats.win + stats.loss;
  const rate = total ? Math.round((stats.win / total) * 100) : 0;
  let html = `<div class="pill-row">
    <span class="pill">红单 ${stats.win}</span>
    <span class="pill">黑单 ${stats.loss}</span>
    <span class="pill">连错 ${stats.streak}</span>
    <span class="pill">命中率 ${rate}%</span>
  </div>`;
  html += `<div class="divider"></div>`;
  if(stats.streak >= 3){
    html += `<div class="danger">⛔ 连错 ${stats.streak} 场，建议停手。</div>`;
  }else if(stats.streak === 2){
    html += `<div class="warn">⚠️ 连错 2 场，进入止损模式：预算减半。</div>`;
  }else{
    html += `<div class="ok">✅ 正常模式，可按系统建议执行。</div>`;
  }
  document.getElementById('riskPanel').innerHTML = html;
}

function saveSelected(){
  localStorage.setItem(selectedKey(), JSON.stringify(selectedMatchIds));
}
function loadSelected(){
  selectedMatchIds = JSON.parse(localStorage.getItem(selectedKey()) || '[]');
}
function saveManualMatches(){
  localStorage.setItem(manualKey(), JSON.stringify(manualMatches));
}
function loadSavedManualMatches(){
  try{
    manualMatches = JSON.parse(localStorage.getItem(manualKey()) || '[]');
    document.getElementById('manualMatches').value = JSON.stringify(manualMatches, null, 2);
    rebuildMatchPool();
    renderPool();
    analyze();
  }catch(e){}
}
function loadSavedManualMatchesSilently(){
  try{
    manualMatches = JSON.parse(localStorage.getItem(manualKey()) || '[]');
    document.getElementById('manualMatches').value = manualMatches.length ? JSON.stringify(manualMatches, null, 2) : '';
  }catch(e){
    manualMatches = [];
  }
}
function clearSavedManualMatches(){
  manualMatches = [];
  localStorage.removeItem(manualKey());
  document.getElementById('manualMatches').value = '';
  rebuildMatchPool();
  renderPool();
  analyze();
}
function mergeManualMatches(){
  const txt = document.getElementById('manualMatches').value.trim();
  if(!txt) return;
  try{
    const arr = JSON.parse(txt);
    if(!Array.isArray(arr)) return;
    manualMatches = arr;
    saveManualMatches();
    rebuildMatchPool();
    renderPool();
    analyze();
  }catch(e){
    document.getElementById('status').innerHTML = '❌ 补录格式错误';
  }
}
function rebuildMatchPool(){
  const map = {};
  backendMatches.forEach(m => map[m.id] = m);
  manualMatches.forEach(m => map[m.id] = m);
  currentMatches = Object.values(map);
}

function renderPool(){
  const box = document.getElementById('poolChips');
  if(!currentMatches.length){
    box.innerHTML = '暂无比赛';
    return;
  }
  box.innerHTML = currentMatches.map(m => {
    const active = selectedMatchIds.includes(m.id);
    return `<span class="chip ${active ? 'active' : ''}" onclick="toggleMatch('${m.id}')">${m.id} ${m.home}vs${m.away}</span>`;
  }).join('');
}
function toggleMatch(id){
  if(selectedMatchIds.includes(id)){
    selectedMatchIds = selectedMatchIds.filter(x => x !== id);
  }else{
    selectedMatchIds.push(id);
  }
  saveSelected();
  renderPool();
  analyze();
}
function selectAllMatches(){
  selectedMatchIds = currentMatches.map(m => m.id);
  saveSelected();
  renderPool();
  analyze();
}
function clearSelectedMatches(){
  selectedMatchIds = [];
  saveSelected();
  renderPool();
  analyze();
}

function minOddsSide(m){
  const min = Math.min(m.homeOdds,m.drawOdds,m.awayOdds);
  if(min === m.homeOdds) return '胜';
  if(min === m.drawOdds) return '平';
  return '负';
}
function getBaseScore(m){
  const min = Math.min(m.homeOdds,m.drawOdds,m.awayOdds);
  if(min < 1.35) return 82;
  if(min < 1.50) return 75;
  if(min < 1.80) return 66;
  if(min < 2.20) return 58;
  return 42;
}
function getMovementInfo(m){
  const prev = lastSnapshot[m.id];
  if(!prev) return {summary:'首次记录',flags:[]};

  const dw = +(m.homeOdds - prev.homeOdds).toFixed(2);
  const dd = +(m.drawOdds - prev.drawOdds).toFixed(2);
  const da = +(m.awayOdds - prev.awayOdds).toFixed(2);
  const flags = [];

  if(Math.abs(dw)>=0.08 || Math.abs(dd)>=0.10 || Math.abs(da)>=0.10) flags.push('赔率异动');
  if(dw>0.08 && m.homeOdds<1.70) flags.push('主胜升赔转弱');
  if(dw< -0.08 && m.homeOdds<1.55) flags.push('主胜持续降赔');
  if(dd< -0.08 && m.drawOdds<3.10) flags.push('平赔陷阱增强');

  return {
    summary:`主${dw>0?'↑':dw<0?'↓':'-'}${Math.abs(dw)} 平${dd>0?'↑':dd<0?'↓':'-'}${Math.abs(dd)} 客${da>0?'↑':da<0?'↓':'-'}${Math.abs(da)}`,
    flags
  };
}
function antiBookieAnalyze(m,singleMatch){
  const pick = minOddsSide(m);
  let score = getBaseScore(m);
  const flags = [];
  const movement = getMovementInfo(m);
  const note = m.note || '';
  const min = Math.min(m.homeOdds,m.drawOdds,m.awayOdds);
  const max = Math.max(m.homeOdds,m.drawOdds,m.awayOdds);
  const spread = +(max-min).toFixed(2);

  if(note.includes('稳胆')){score += 6; flags.push('样本备注：稳胆');}
  if(note.includes('次稳')){score += 3; flags.push('样本备注：次稳');}
  if(note.includes('诱盘')){score -= 10; flags.push('样本备注：诱盘');}
  if(note.includes('异常')){score -= 10; flags.push('样本备注：赔率异常');}
  if(note.includes('均势')){score -= 8; flags.push('样本备注：均势');}
  if(note.includes('伪强盘')){score -= 10; flags.push('样本备注：伪强盘');}

  if(spread < 0.45){score -= 12; flags.push('伪均势盘');}
  if(m.drawOdds < 3.0){score -= 10; flags.push('平赔陷阱');}
  if(min < 1.35 && spread < 3.5){score -= 8; flags.push('低赔过热');}

  movement.flags.forEach(f=>flags.push(f));
  if(movement.flags.includes('主胜升赔转弱')) score -= 10;
  if(movement.flags.includes('平赔陷阱增强')) score -= 8;
  if(movement.flags.includes('主胜持续降赔')) score += 3;

  if(stats.streak >= 2){
    score -= 8;
    flags.push('止损模式');
  }

  score = Math.max(25, Math.min(90, score));

  let level='放弃', cls='t-red', advice='不建议介入';
  if(score >= 74){ level='主线'; cls='t-green'; advice='可做主线'; }
  else if(score >= 60){ level='增益'; cls='t-yellow'; advice='可做辅助串关'; }
  else if(score >= 45){ level='防守'; cls='t-blue'; advice='只能小注防守'; }

  if(m.id === singleMatch && level !== '放弃') advice += '｜可做利润单';

  return {...m,pick,score,level,cls,flags,advice,movement};
}

function renderOverview(results){
  const mains = results.filter(x=>x.level==='主线');
  const warns = results.filter(x=>x.flags.length>0);
  const label = document.getElementById('dayLabel').value.trim();

  let html = '';
  if(label) html += `<div class="small">比赛日：${label}</div><div class="divider"></div>`;

  if(!results.length) return `<div class="warn">还没有选择今日比赛。</div>`;

  if(stats.streak >= 2){
    html += `<div class="warn">当前处于止损模式，请降低仓位。</div><div class="divider"></div>`;
  }

  if(!mains.length){
    html += `<div class="danger">今日无合格主线，建议观察。</div>`;
    return html;
  }

  html += `<div class="ok">主线：${mains.map(x=>`${x.id}${x.pick}`).join('；')}</div>`;
  if(warns.length){
    html += `<div class="small" style="margin-top:8px;">风险场：${warns.map(x=>x.id).join('、')}</div>`;
  }
  return html;
}

function renderMatches(results){
  return results.map(m=>`
    <div class="match">
      <div class="match-top">
        <div>
          <div class="match-id">${m.id}</div>
          <div class="match-name">${m.home} vs ${m.away}</div>
          <div class="match-league">${m.league || ''}</div>
        </div>
        <span class="tag ${m.cls}">${m.level}</span>
      </div>
      <div class="odds-row">
        <div class="odds-box"><b>胜</b><span>${m.homeOdds}</span></div>
        <div class="odds-box"><b>平</b><span>${m.drawOdds}</span></div>
        <div class="odds-box"><b>负</b><span>${m.awayOdds}</span></div>
      </div>
      <div class="divider"></div>
      <div>推荐：<b>${m.pick}</b> ｜ 评分：<b>${m.score}</b></div>
      <div class="small">变化：${m.movement.summary}</div>
      <div class="small">建议：${m.advice}</div>
      ${m.flags.length ? `<div class="small" style="margin-top:6px;">提示：${m.flags.join('｜')}</div>` : `<div class="small" style="margin-top:6px;">提示：无明显风险</div>`}
    </div>
  `).join('');
}

function renderBets(results,budget,singleMatch){
  const mains = results.filter(x=>x.level==='主线').slice(0,2);
  const gains = results.filter(x=>x.level==='增益').slice(0,2);
  const defense = results.filter(x=>x.level==='防守').slice(0,1);
  const single = results.find(x=>x.id===singleMatch && x.level!=='放弃');

  if(!results.length) return `<div class="warn">先选择今日比赛。</div>`;
  if(!mains.length) return `<div class="danger">今日主线不足，建议空仓。</div>`;

  let useBudget = budget;
  if(stats.streak >= 2) useBudget = Math.floor(budget*0.5);

  const singleAmt = Math.floor(useBudget*0.5);
  const comboAmt = Math.floor(useBudget*0.3);
  const hedgeAmt = useBudget - singleAmt - comboAmt;

  let html = `
    <div class="pill-row">
      <span class="pill">主线预算 ${singleAmt}</span>
      <span class="pill">串关预算 ${comboAmt}</span>
      <span class="pill">防守预算 ${hedgeAmt}</span>
    </div>
    <div class="divider"></div>
    <div>单关主线：${mains[0].id} ${mains[0].pick}（${singleAmt}元）</div>
  `;
  if(mains.length >= 2){
    html += `<div>2串1主线：${mains[0].id}${mains[0].pick} + ${mains[1].id}${mains[1].pick}（${comboAmt}元）</div>`;
  }else if(gains.length){
    html += `<div>2串1增强：${mains[0].id}${mains[0].pick} + ${gains[0].id}${gains[0].pick}（${comboAmt}元）</div>`;
  }else{
    html += `<div>2串1：今日不建议强凑</div>`;
  }
  if(defense.length){
    html += `<div>防守位：${defense[0].id} ${defense[0].pick}（${hedgeAmt}元）</div>`;
  }else{
    html += `<div>防守位：主线反方向小防（${hedgeAmt}元）</div>`;
  }
  if(single){
    html += `<div style="margin-top:8px;">利润单：${single.id} ${single.pick}</div>`;
  }
  return html;
}

function renderArchiveOptions(){
  const sel = document.getElementById('archiveSelect');
  const list = JSON.parse(localStorage.getItem(archiveListKey()) || '[]');
  sel.innerHTML = `<option value="">选择历史比赛日</option>` + list.map(x=>`<option value="${x}">${x}</option>`).join('');
}
function saveArchive(){
  const label = dayKey();
  if(!label || label === 'default-day') return;
  const budget = parseFloat(document.getElementById('budget').value || '200');
  const singleMatch = document.getElementById('singleMatch').value.trim();
  const filtered = currentMatches.filter(m=>selectedMatchIds.includes(m.id));
  const results = filtered.map(m=>antiBookieAnalyze(m,singleMatch)).sort((a,b)=>b.score-a.score);

  const payload = {
    label,
    savedAt:new Date().toLocaleString(),
    budget,
    singleMatch,
    selectedMatchIds,
    manualMatches,
    results,
    stats
  };
  localStorage.setItem(archiveKey(label), JSON.stringify(payload));

  let list = JSON.parse(localStorage.getItem(archiveListKey()) || '[]');
  if(!list.includes(label)) list.unshift(label);
  else list = [label, ...list.filter(x=>x!==label)];
  localStorage.setItem(archiveListKey(), JSON.stringify(list));
  renderArchiveOptions();
  document.getElementById('archiveView').innerHTML = `<div class="archiveItem"><span class="ok">已保存比赛日归档：${label}</span></div>`;
}
function loadArchive(){
  const label = document.getElementById('archiveSelect').value;
  if(!label) return;
  const raw = localStorage.getItem(archiveKey(label));
  if(!raw){
    document.getElementById('archiveView').innerHTML = '归档不存在';
    return;
  }
  const data = JSON.parse(raw);
  let html = `
    <div class="archiveItem">
      <b>${data.label}</b>
      <div class="small">保存时间：${data.savedAt}</div>
      <div class="small">预算：${data.budget}｜利润单：${data.singleMatch}</div>
      <div class="small">红单：${data.stats.win}｜黑单：${data.stats.loss}｜连错：${data.stats.streak}</div>
    </div>
  `;
  if(data.results?.length){
    html += data.results.map(m=>`
      <div class="archiveItem">
        <div><b>${m.id} ${m.home} vs ${m.away}</b> <span class="tag ${m.cls}">${m.level}</span></div>
        <div class="small">推荐：${m.pick}｜评分：${m.score}</div>
      </div>
    `).join('');
  }
  document.getElementById('archiveView').innerHTML = html;
}

async function loadData(){
  try{
    const res = await fetch('./data/odds.json?v=' + Date.now());
    const data = await res.json();
    backendMatches = data.matches || [];

    document.getElementById('status').innerHTML = `✔ 已加载（${data.updated_at || '无时间'}）`;
    document.getElementById('kpiUpdated').textContent = (data.updated_at || '--').slice(11,16) || '--';

    loadSavedManualMatchesSilently();
    loadSelected();
    rebuildMatchPool();
    renderPool();
    analyze();
    updateSnapshot(currentMatches);
  }catch(e){
    document.getElementById('status').innerHTML = '❌ 后台数据读取失败';
  }
}
function updateSnapshot(matches){
  const next = {};
  matches.forEach(m=>{
    next[m.id] = {homeOdds:m.homeOdds, drawOdds:m.drawOdds, awayOdds:m.awayOdds};
  });
  localStorage.setItem('betapp_odds_snapshot', JSON.stringify(next));
  lastSnapshot = next;
}
function analyze(){
  const budget = parseFloat(document.getElementById('budget').value || '200');
  const singleMatch = document.getElementById('singleMatch').value.trim();
  const filtered = currentMatches.filter(m=>selectedMatchIds.includes(m.id));
  const results = filtered.map(m=>antiBookieAnalyze(m,singleMatch)).sort((a,b)=>b.score-a.score);

  renderTopStats(results.filter(x=>x.level==='主线').length, results.filter(x=>x.flags.length>0).length);
  renderRiskPanel();
  document.getElementById('overview').innerHTML = renderOverview(results);
  document.getElementById('matches').innerHTML = renderMatches(results);
  document.getElementById('bets').innerHTML = renderBets(results,budget,singleMatch);
}

document.getElementById('budget').addEventListener('input', analyze);
document.getElementById('singleMatch').addEventListener('input', analyze);
document.getElementById('dayLabel').addEventListener('change', ()=>{
  loadSavedManualMatches();
  loadSelected();
  rebuildMatchPool();
  renderPool();
  analyze();
  renderArchiveOptions();
});

renderTopStats();
renderRiskPanel();
renderArchiveOptions();
setInterval(loadData, 30000);
loadData();
</script>
</body>
</html>
