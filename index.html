<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>投注助手 V5（智能引擎）</title>

<style>
body{
  margin:0;
  background:#0b1220;
  color:#fff;
  font-family:-apple-system;
}
.app{max-width:430px;margin:auto;padding:16px}
.card{
  background:#121a2b;
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}
.title{font-size:20px;font-weight:700}
.input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  background:#eee;
  font-size:16px;
}
.btn{
  margin-top:14px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#4a7cff;
  color:#fff;
  font-size:18px;
}
.result{
  margin-top:10px;
  font-size:16px;
  line-height:1.6;
}
.green{color:#4ade80}
.red{color:#f87171}
.yellow{color:#facc15}
</style>
</head>

<body>
<div class="app">

<div class="title">🔥 投注助手 V5（智能决策）</div>

<div class="card">
  <div>输入赔率</div>
  <input id="home" class="input" placeholder="主胜（如1.85)">
  <input id="draw" class="input" placeholder="平（如3.20)">
  <input id="away" class="input" placeholder="客胜（如4.10)">
  <button class="btn" onclick="analyze()">开始分析</button>
</div>

<div class="card">
  <div class="result" id="output">等待分析...</div>
</div>

</div>

<script>
function analyze(){
  let h = parseFloat(document.getElementById("home").value);
  let d = parseFloat(document.getElementById("draw").value);
  let a = parseFloat(document.getElementById("away").value);

  if(!h || !d || !a){
    alert("请输入完整赔率");
    return;
  }

  // ===== 概率计算 =====
  let ph = 1/h;
  let pd = 1/d;
  let pa = 1/a;

  let total = ph + pd + pa;

  ph /= total;
  pd /= total;
  pa /= total;

  // ===== 判断逻辑 =====
  let result = "";
  let confidence = 0;

  if(ph > 0.5){
    result = "胜";
    confidence = ph;
  }else if(pa > 0.4){
    result = "负";
    confidence = pa;
  }else{
    result = "平";
    confidence = pd;
  }

  // ===== 风险模型 =====
  let risk = "";
  if(d < 3.0){
    risk = "⚠️ 平局陷阱（庄家收割点）";
  }else if(Math.abs(h - a) < 0.3){
    risk = "⚠️ 均势盘（高风险）";
  }else{
    risk = "✅ 正常盘口";
  }

  // ===== 投注建议 =====
  let bet = "";
  if(confidence > 0.65){
    bet = "🔥 主推（可单关）";
  }else if(confidence > 0.55){
    bet = "🟡 次推（串关）";
  }else{
    bet = "❌ 放弃";
  }

  // ===== 输出 =====
  document.getElementById("output").innerHTML = `
  推荐结果：<b class="green">${result}</b><br>
  信心值：${(confidence*100).toFixed(1)}%<br><br>

  风险判断：${risk}<br><br>

  投注建议：<b>${bet}</b>
  `;
}
</script>

</body>
</html>
