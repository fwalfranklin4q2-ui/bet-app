<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>智能分析系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; padding: 10px;">

  <h2>📊 今日核心判断</h2>
  <div id="homeCoreText">等待分析...</div>

  <h2>📋 比赛分析</h2>
  <div id="backendList"></div>

<script>
let backendMatches = [];

// 🚀 拉取GitHub数据
fetch('data/odds.json')
  .then(res => res.json())
  .then(data => {
    backendMatches = data.matches || [];
    renderBackendMatches();
    renderHomeCore();
  })
  .catch(err => {
    console.log('加载赔率失败', err);
  });

// 📊 比赛列表
function renderBackendMatches(){
  const container = document.getElementById('backendList');
  if(!container) return;

  if(!backendMatches.length){
    container.innerHTML = `<div>暂无数据（等待抓取）</div>`;
    return;
  }

  container.innerHTML = backendMatches.map(m => {

    const confidence = m.analysis?.confidence ?? 0;

    let color = '#999';
    if(confidence >= 75) color = '#4ade80';
    else if(confidence >= 60) color = '#facc15';
    else color = '#f87171';

    return `
      <div style="border:1px solid #ddd;padding:12px;margin:10px 0;border-radius:10px;">
        <div><b>${m.id}</b> ${m.home} vs ${m.away}</div>
        <div>赔率：${m.homeOdds} / ${m.drawOdds} / ${m.awayOdds}</div>
        <div style="color:${color};">
          推荐：${m.analysis?.recommend ?? '等待分析'}
          | 信心：${confidence}
          | 风险：${m.analysis?.risk ?? '--'}
        </div>
        <div style="color:#999;">
          标签：${m.analysis?.tag ?? '-'}
        </div>
      </div>
    `;
  }).join('');
}

// 🎯 首页主线
function renderHomeCore(){
  const box = document.getElementById('homeCoreText');
  if(!box) return;

  if(!backendMatches.length){
    box.innerHTML = '等待分析...';
    return;
  }

  const mainList = backendMatches
    .filter(m => (m.analysis?.confidence ?? 0) >= 70)
    .map(m => `${m.id}${m.analysis?.recommend ?? ''}`);

  if(!mainList.length){
    box.innerHTML = '暂无主线';
    return;
  }

  box.innerHTML = `🔥 主线推荐：${mainList.join('；')}`;
}
</script>

</body>
</html>
