<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投注助手 V9（实战版）</title>

<style>
body{
  margin:0;
  background:#0b1220;
  color:#fff;
  font-family:-apple-system;
}
.app{
  max-width:430px;
  margin:auto;
  padding:16px;
}
.card{
  background:#121a2b;
  border-radius:14px;
  padding:16px;
  margin-bottom:14px;
}
input,textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
  font-size:16px;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#6a5cff,#8f5cff);
  color:#fff;
  font-size:16px;
}
.tag{
  padding:2px 8px;
  border-radius:6px;
  font-size:12px;
}
.ok{background:#1f8f4d;}
.mid{background:#b88700;}
.bad{background:#8f2a2a;}
</style>
</head>

<body>
<div class="app">

<h2>🔥 投注助手 V9（实战版）</h2>

<div class="card">
  <b>总预算</b>
  <input id="budget" value="200">
</div>

<div class="card">
  <b>自动赔率状态</b>
  <div id="status">加载中...</div>
  <button onclick="loadData()">立即读取后台数据</button>
</div>

<div class="card">
  <b>分析结果</b>
  <div id="result">等待分析...</div>
</div>

</div>

<script>

let matches = []

async function loadData(){
  try{
    let res = await fetch("./data/odds.json?t="+Date.now())
    let data = await res.json()

    matches = data.matches || []

    document.getElementById("status").innerHTML =
      "✔ 已加载 (" + data.updated_at + ")"

    analyze()

  }catch(e){
    document.getElementById("status").innerHTML = "❌ 读取失败"
  }
}

function analyze(){

  let budget = parseFloat(document.getElementById("budget").value)

  let main = []
  let sub = []
  let risk = []

  matches.forEach(m=>{

    let min = Math.min(m.homeOdds,m.drawOdds,m.awayOdds)

    if(min < 1.5){
      main.push({...m, pick:getPick(m)})
    }
    else if(min < 2.2){
      sub.push({...m, pick:getPick(m)})
    }
    else{
      risk.push({...m, pick:getPick(m)})
    }

  })

  let html = ""

  html += renderBlock("主线", main, "ok")
  html += renderBlock("增益", sub, "mid")
  html += renderBlock("放弃", risk, "bad")

  html += renderBet(main, sub, budget)

  document.getElementById("result").innerHTML = html
}

function getPick(m){
  if(m.homeOdds < m.drawOdds && m.homeOdds < m.awayOdds) return "胜"
  if(m.drawOdds < m.homeOdds && m.drawOdds < m.awayOdds) return "平"
  return "负"
}

function renderBlock(title,list,cls){
  if(!list.length) return ""

  let html = `<h4>${title}</h4>`

  list.forEach(m=>{
    html += `
    <div>
      ${m.id} ${m.home} vs ${m.away}
      <span class="tag ${cls}">${m.pick}</span>
    </div>`
  })

  return html
}

function renderBet(main,sub,budget){

  if(main.length < 1) return ""

  let m = main[0]

  let single = Math.floor(budget*0.5)
  let parlay = Math.floor(budget*0.3)
  let hedge = budget - single - parlay

  let html = "<hr><h4>💰 实战建议</h4>"

  html += `
  单关：${m.id} ${m.pick}（${single}元）<br>
  2串1：${main.slice(0,2).map(x=>x.id+x.pick).join("+")}（${parlay}元）<br>
  防守：${m.id} 反方向（${hedge}元）
  `

  return html
}

setInterval(loadData,30000)

loadData()

</script>

</body>
</html>
