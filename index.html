<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>投注助手 App V2</title>

<style>
body{
  margin:0;
  background:#0b1220;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont;
}
.app{max-width:430px;margin:auto;padding:16px}
.card{
  background:#121a2b;
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}
.title{font-size:20px;font-weight:700;margin-bottom:10px}
.kpi{display:flex;justify-content:space-between}
.kpi div{text-align:center}
.btn{
  background:#2f6bff;
  padding:12px;
  border-radius:10px;
  text-align:center;
  margin-top:10px;
}
.badge{font-size:12px;color:#aaa}
.good{color:#4cff9d}
.warn{color:#ffcc00}
.danger{color:#ff5c5c}
</style>
</head>

<body>
<div class="app">

<div class="title">🔥 投注助手 V2（自动分析版）</div>

<div class="card">
<div class="kpi">
<div><div>2000</div><div class="badge">预算</div></div>
<div><div>260</div><div class="badge">已用</div></div>
<div><div>1740</div><div class="badge">剩余</div></div>
</div>
</div>

<div class="card">
<div class="title">今日分析</div>

<div class="good">主线：2006 胜 × 2007 胜</div>
<div class="badge">稳胆组合（系统评分 82）</div>

<br>

<div class="warn">增强：2006 胜 × 2005 负</div>
<div class="badge">收益放大（系统评分 71）</div>

<br>

<div class="danger">防守：2001 胜/平 × 2007 胜</div>
<div class="badge">防爆（系统评分 63）</div>

<br>

<div>🔥 单关：2003 平</div>
<div class="badge">高赔率博弈（系统评分 68）</div>

<div class="btn">立即下注</div>
</div>

<div class="card">
<div class="title">自动分析引擎</div>
<div class="badge">基于赔率+风险模型生成</div>
</div>

</div>

<script>
// ===== 自动分析逻辑（核心） =====

const matches = [
  {id:2006, odds:1.45},
  {id:2007, odds:1.52},
  {id:2005, odds:2.9},
  {id:2001, odds:2.1},
  {id:2003, odds:3.2}
];

function analyze(){
  return matches.map(m=>{
    let score = 0;

    if(m.odds < 1.6) score += 80;
    else if(m.odds < 2.2) score += 65;
    else score += 55;

    return {
      id:m.id,
      score:score
    };
  });
}

console.log("自动分析结果：", analyze());
</script>

</body>
</html>
