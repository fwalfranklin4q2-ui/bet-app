<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>投注助手 V12（每日比赛半自动版）</title>
<style>
  :root{
    --bg:#0b1220;
    --panel:#121a2b;
    --panel2:#0f172a;
    --text:#ffffff;
    --muted:#9ca3af;
    --green:#4ade80;
    --yellow:#facc15;
    --red:#f87171;
    --blue:#60a5fa;
    --purple:#8b5cf6;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif;
  }
  .app{max-width:430px;margin:auto;padding:16px}
  .title{font-size:24px;font-weight:800;margin-bottom:8px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:14px}
  .card{
    background:var(--panel);
    border-radius:16px;
    padding:14px;
    margin-bottom:14px;
  }
  .card h3{margin:0 0 10px 0;font-size:18px}
  .input, .textarea, .select{
    width:100%;
    border:none;
    border-radius:12px;
    padding:12px;
    font-size:16px;
    background:#f3f4f6;
    color:#111827;
    margin-top:8px;
  }
  .textarea{min-height:140px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .btn{
    width:100%;
    margin-top:10px;
    border:none;
    border-radius:12px;
    padding:13px;
    font-size:15px;
    font-weight:700;
    color:#fff;
    background:linear-gradient(90deg,#6a5cff,#8f5cff);
  }
  .btn.secondary{background:#334155}
  .btn.green{background:#166534}
  .btn.red{background:#991b1b}
  .btn.blue{background:#1d4ed8}
  .rowBtns{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:10px;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .kpi{
    background:var(--panel2);
    border-radius:14px;
    padding:14px 12px;
    text-align:center;
  }
  .kpi .v{font-size:22px;font-weight:800}
  .kpi .l{margin-top:4px;font-size:12px;color:var(--muted)}
  .match{
    background:var(--panel2);
    border-radius:14px;
    padding:12px;
    margin-top:10px;
  }
  .top{
    display:flex;
    justify-content:space-between;
    gap:8px;
    align-items:flex-start;
  }
  .name{font-weight:700;font-size:16px}
  .small{color:var(--muted);font-size:13px}
  .divider{height:1px;background:#24324d;margin:10px 0}
  .tag{
    display:inline-block;
    padding:4px 8px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
  }
  .t-green{background:rgba(74,222,128,.15);color:var(--green)}
  .t-yellow{background:rgba(250,204,21,.15);color:var(--yellow)}
  .t-red{background:rgba(248,113,113,.15);color:var(--red)}
  .t-blue{background:rgba(96,165,250,.15);color:var(--blue)}
  .warn{color:var(--yellow)}
  .danger{color:var(--red)}
  .ok{color:var(--green)}
  .chip{
    display:inline-block;
    padding:5px 9px;
    border-radius:999px;
    background:rgba(96,165,250,.12);
    color:#c7d9ff;
    font-size:12px;
    margin:2px 4px 0 0;
  }
</style>
</head>
<body>
<div class="app">

  <div class="title">🔥 投注助手 V12（每日比赛半自动版）</div>
  <div class="sub">每日比赛管理｜自动赔率｜自动分析｜防庄识别｜红黑统计｜止损保护</div>

  <div class="card">
    <h3>今日总控</h3>
    <input id="budget" class="input" type="number" value="200" placeholder="总预算">
    <input id="singleMatch" class="input" type="text" value="2006" placeholder="利润单关场编号">
    <input id="dayLabel" class="input" type="text" value="" placeholder="今日标签，例如 2026-04-16 晚场">
    <div class="small" style="margin-top:8px;">利润单只在指定编号开启。今日标签用于区分不同比赛日。</div>
  </div>

  <div class="card">
    <h3>自动赔率状态</h3>
    <div id="status">加载中...</div>
    <button class="btn" onclick="loadData()">立即读取后台数据</button>
    <div class="small" style="margin-top:8px;">默认读取 ./data/odds.json，并每30秒自动刷新。</div>
  </div>

  <div class="card">
    <h3>今日比赛池</h3>
    <div class="small">从后台读取的比赛里，勾选今天要参与分析的场次。</div>
    <div id="poolChips" style="margin-top:8px;">等待加载...</div>
    <button class="btn blue" onclick="selectAllMatches()">全选今日比赛</button>
    <button class="btn secondary" onclick="clearSelectedMatches()">清空今日比赛</button>
  </div>

  <div class="card">
    <h3>手动补录比赛（可选）</h3>
    <textarea id="manualMatches" class="textarea" placeholder='可补录 JSON 数组，例如 [{"id":"3001","home":"A","away":"B","league":"测试","homeOdds":1.80,"drawOdds":3.20,"awayOdds":4.20,"note":"手动补录"}]'></textarea>
    <button class="btn secondary" onclick="mergeManualMatches()">合并手动补录到今日比赛池</button>
  </div>

  <div class="card">
    <h3>统计面板</h3>
    <div class="grid">
      <div class="kpi"><div class="v" id="kpiBudget">200</div><div class="l">总预算</div></div>
      <div class="kpi"><div class="v" id="kpiUpdated">--</div><div class="l">更新时间</div></div>
      <div class="kpi"><div class="v" id="kpiWin">0</div><div class="l">红单</div></div>
      <div class="kpi"><div class="v" id="kpiLoss">0</div><div class="l">黑单</div></div>
      <div class="kpi"><div class="v" id="kpiStreak">0</div><div class="l">连错</div></div>
      <div class="kpi"><div class="v" id="kpiRate">0%</div><div class="l">命中率</div></div>
    </div>
  </div>

  <div class="card">
    <h3>止损状态</h3>
    <div id="riskPanel">等待分析...</div>
    <div class="rowBtns">
      <button class="btn green" onclick="markLastBet('win')">最近一单：红了</button>
      <button class="btn red" onclick="markLastBet('loss')">最近一单：黑了</button>
    </div>
    <button class="btn secondary" onclick="resetStats()">重置统计</button>
  </div>

  <div class="card">
    <h3>今日总判断</h3>
    <div id="overview">等待分析...</div>
  </div>

  <div class="card">
    <h3>今日逐场分析</h3>
    <div id="matches">等待分析...</div>
  </div>

  <div class="card">
    <h3>今日实战建议</h3>
    <div id="bets">等待分析...</div>
  </div>

</div>

<script>
let currentMatches = [];
let selectedMatchIds = JSON.parse(localStorage.getItem('betapp_selected_ids') || '[]');
let lastSnapshot = JSON.parse(localStorage.getItem('betapp_odds_snapshot') || '{}');
let stats = JSON.parse(localStorage.getItem('betapp_stats') || '{"win":0,"loss":0,"streak":0}');

function saveSelected(){
  localStorage.setItem('betapp_selected_ids', JSON.stringify(selectedMatchIds));
}
function saveStats(){
  localStorage.setItem('betapp_stats', JSON.stringify(stats));
  renderStats();
  analyze();
}
function renderStats(){
  const total = stats.win + stats.loss;
  const rate = total ? Math.round((stats.win / total) * 100) : 0;
  document.getElementById('kpiWin').textContent = stats.win;
  document.getElementById('kpiLoss').textContent = stats.loss;
  document.getElementById('kpiStreak').textContent = stats.streak;
  document.getElementById('kpiRate').textContent = rate + '%';

  let html = '';
  if(stats.streak >= 3){
    html = `<div class="danger">⛔ 连错 ${stats.streak} 场，建议今日停手或仅观察。</div>`;
  }else if(stats.streak === 2){
    html = `<div class="warn">⚠️ 连错 2 场，进入止损模式：预算减半、禁止强凑串关。</div>`;
  }else{
    html = `<div class="ok">✅ 正常模式：可按系统建议执行。</div>`;
  }
  html += `<div class="small" style="margin-top:8px;">红单 ${stats.win}｜黑单 ${stats.loss}｜命中率 ${rate}%</div>`;
  document.getElementById('riskPanel').innerHTML = html;
}
function markLastBet(type){
  if(type === 'win'){
    stats.win += 1;
    stats.streak = 0;
  }else{
    stats.loss += 1;
    stats.streak += 1;
  }
  saveStats();
}
function resetStats(){
  stats = {win:0, loss:0, streak:0};
  saveStats();
}

function minOddsSide(m){
  const min = Math.min(m.homeOdds, m.drawOdds, m.awayOdds);
  if(min === m.homeOdds) return '胜';
  if(min === m.drawOdds) return '平';
  return '负';
}
function getBaseScore(m){
  let min = Math.min(m.homeOdds, m.drawOdds, m.awayOdds);
  if(min < 1.35) return 82;
  if(min < 1.50) return 75;
  if(min < 1.80) return 66;
  if(min < 2.20) return 58;
  return 42;
}
function getMovementInfo(m){
  const prev = lastSnapshot[m.id];
  if(!prev){
    return { summary:'首次记录', flags:[] };
  }

  const dw = +(m.homeOdds - prev.homeOdds).toFixed(2);
  const dd = +(m.drawOdds - prev.drawOdds).toFixed(2);
  const da = +(m.awayOdds - prev.awayOdds).toFixed(2);
  const flags = [];

  if(Math.abs(dw) >= 0.08 || Math.abs(dd) >= 0.10 || Math.abs(da) >= 0.10) flags.push('赔率异动');
  if(dw > 0.08 && m.homeOdds < 1.70) flags.push('主胜升赔转弱');
  if(dw < -0.08 && m.homeOdds < 1.55) flags.push('主胜持续降赔');
  if(dd < -0.08 && m.drawOdds < 3.10) flags.push('平赔陷阱增强');

  return {
    summary:`主${dw > 0 ? '↑' : dw < 0 ? '↓' : '-'}${Math.abs(dw)} 平${dd > 0 ? '↑' : dd < 0 ? '↓' : '-'}${Math.abs(dd)} 客${da > 0 ? '↑' : da < 0 ? '↓' : '-'}${Math.abs(da)}`,
    flags
  };
}

function antiBookieAnalyze(m, singleMatch){
  const pick = minOddsSide(m);
  let score = getBaseScore(m);
  const flags = [];
  const movement = getMovementInfo(m);
  const note = m.note || '';
  const min = Math.min(m.homeOdds, m.drawOdds, m.awayOdds);
  const max = Math.max(m.homeOdds, m.drawOdds, m.awayOdds);
  const spread = +(max - min).toFixed(2);

  if(note.includes('稳胆')) { score += 6; flags.push('样本备注：稳胆'); }
  if(note.includes('次稳')) { score += 3; flags.push('样本备注：次稳'); }
  if(note.includes('诱盘')) { score -= 10; flags.push('样本备注：诱盘'); }
  if(note.includes('异常')) { score -= 10; flags.push('样本备注：赔率异常'); }
  if(note.includes('均势')) { score -= 8; flags.push('样本备注：均势'); }

  if(spread < 0.45){ score -= 12; flags.push('伪均势盘'); }
  if(m.drawOdds < 3.0){ score -= 10; flags.push('平赔陷阱'); }
  if(min < 1.35 && spread < 3.5){ score -= 8; flags.push('低赔过热'); }

  movement.flags.forEach(f => flags.push(f));
  if(movement.flags.includes('主胜升赔转弱')) score -= 10;
  if(movement.flags.includes('平赔陷阱增强')) score -= 8;
  if(movement.flags.includes('主胜持续降赔')) score += 3;

  if(stats.streak >= 2){
    score -= 8;
    flags.push('止损模式');
  }

  if(score > 90) score = 90;
  if(score < 25) score = 25;

  let level = '放弃';
  let cls = 't-red';
  let advice = '不建议介入';

  if(score >= 74){
    level = '主线';
    cls = 't-green';
    advice = '可做主线';
  }else if(score >= 60){
    level = '增益';
    cls = 't-yellow';
    advice = '可做辅助串关';
  }else if(score >= 45){
    level = '防守';
    cls = 't-blue';
    advice = '只能小注防守';
  }

  if(m.id === singleMatch && level !== '放弃'){
    advice += '｜可做利润单';
  }

  return {
    ...m,
    pick,
    score,
    level,
    cls,
    flags,
    advice,
    movement
  };
}

function renderPool(){
  const box = document.getElementById('poolChips');
  if(!currentMatches.length){
    box.innerHTML = '暂无比赛';
    return;
  }
  box.innerHTML = currentMatches.map(m => {
    const active = selectedMatchIds.includes(m.id);
    return `<span class="chip" style="border:${active ? '1px solid #4ade80' : '1px solid transparent'};cursor:pointer" onclick="toggleMatch('${m.id}')">${m.id} ${m.home}vs${m.away}</span>`;
  }).join('');
}

function toggleMatch(id){
  if(selectedMatchIds.includes(id)){
    selectedMatchIds = selectedMatchIds.filter(x => x !== id);
  }else{
    selectedMatchIds.push(id);
  }
  saveSelected();
  renderPool();
  analyze();
}

function selectAllMatches(){
  selectedMatchIds = currentMatches.map(m => m.id);
  saveSelected();
  renderPool();
  analyze();
}

function clearSelectedMatches(){
  selectedMatchIds = [];
  saveSelected();
  renderPool();
  analyze();
}

function mergeManualMatches(){
  const txt = document.getElementById('manualMatches').value.trim();
  if(!txt) return;
  try{
    const arr = JSON.parse(txt);
    if(!Array.isArray(arr)) return;
    arr.forEach(item => {
      if(!currentMatches.find(x => x.id === item.id)){
        currentMatches.push(item);
      }
    });
    renderPool();
    analyze();
    document.getElementById('status').innerHTML += '｜已合并手动补录';
  }catch(e){}
}

function renderOverview(results){
  const mains = results.filter(x => x.level === '主线');
  const warns = results.filter(x => x.flags.length > 0);

  let html = '';
  const label = document.getElementById('dayLabel').value.trim();
  if(label){
    html += `<div class="small">今日标签：${label}</div><div class="divider"></div>`;
  }

  if(stats.streak >= 3){
    html += `<div class="danger">⛔ 连错达到 ${stats.streak}，建议今日停手。</div><div class="divider"></div>`;
  }else if(stats.streak === 2){
    html += `<div class="warn">⚠️ 止损模式中：预算减半，串关降级。</div><div class="divider"></div>`;
  }

  if(!results.length){
    html += `<div class="warn">还没有选择今日比赛。</div>`;
    return html;
  }

  if(!mains.length){
    html += `<div class="danger">今日无合格主线，建议观察或极小仓位。</div>`;
    return html;
  }

  html += `<div class="ok">今日主线：${mains.map(x => `${x.id}${x.pick}`).join('；')}</div>`;
  if(warns.length){
    html += `<div class="warn" style="margin-top:8px;">风险场：${warns.map(x => x.id).join('、')}</div>`;
  }
  return html;
}

function renderMatches(results){
  return results.map(m => `
    <div class="match">
      <div class="top">
        <div>
          <div class="name">${m.id} ${m.home} vs ${m.away}</div>
          <div class="small">${m.league || ''}</div>
        </div>
        <div><span class="tag ${m.cls}">${m.level}</span></div>
      </div>
      <div class="divider"></div>
      <div>推荐：<b>${m.pick}</b> ｜ 评分：<b>${m.score}</b></div>
      <div class="small">赔率：胜 ${m.homeOdds} ｜ 平 ${m.drawOdds} ｜ 负 ${m.awayOdds}</div>
      <div class="small">变化：${m.movement.summary}</div>
      <div class="small">建议：${m.advice}</div>
      ${m.flags.length ? `<div class="small" style="margin-top:6px;">提示：${m.flags.join('｜')}</div>` : `<div class="small" style="margin-top:6px;">提示：无明显风险</div>`}
    </div>
  `).join('');
}

function renderBets(results, budget, singleMatch){
  const mains = results.filter(x => x.level === '主线').slice(0,2);
  const gains = results.filter(x => x.level === '增益').slice(0,2);
  const defense = results.filter(x => x.level === '防守').slice(0,1);
  const single = results.find(x => x.id === singleMatch && x.level !== '放弃');

  if(!results.length){
    return `<div class="warn">先选择今日比赛。</div>`;
  }
  if(!mains.length){
    return `<div class="danger">今日主线不足，建议空仓或只做极小防守。</div>`;
  }

  let useBudget = budget;
  if(stats.streak >= 2) useBudget = Math.floor(budget * 0.5);

  const singleAmt = Math.floor(useBudget * 0.5);
  const comboAmt = Math.floor(useBudget * 0.3);
  const hedgeAmt = useBudget - singleAmt - comboAmt;

  let html = `<div>单关主线：${mains[0].id} ${mains[0].pick}（${singleAmt}元）</div>`;

  if(mains.length >= 2){
    html += `<div>2串1主线：${mains[0].id}${mains[0].pick} + ${mains[1].id}${mains[1].pick}（${comboAmt}元）</div>`;
  }else if(gains.length){
    html += `<div>2串1增强：${mains[0].id}${mains[0].pick} + ${gains[0].id}${gains[0].pick}（${comboAmt}元）</div>`;
  }else{
    html += `<div>2串1：今日不建议强行凑单</div>`;
  }

  if(defense.length){
    html += `<div>防守位：${defense[0].id} ${defense[0].pick}（${hedgeAmt}元）</div>`;
  }else{
    html += `<div>防守位：主线反方向小防（${hedgeAmt}元）</div>`;
  }

  if(single){
    html += `<div style="margin-top:8px;">利润单：${single.id} ${single.pick}（从防守位中拆小额）</div>`;
  }

  if(stats.streak >= 2){
    html += `<div class="warn" style="margin-top:8px;">当前止损模式：总执行预算已自动降到 ${useBudget} 元。</div>`;
  }

  return html;
}

function updateSnapshot(matches){
  const next = {};
  matches.forEach(m => {
    next[m.id] = {
      homeOdds:m.homeOdds,
      drawOdds:m.drawOdds,
      awayOdds:m.awayOdds
    };
  });
  localStorage.setItem('betapp_odds_snapshot', JSON.stringify(next));
  lastSnapshot = next;
}

async function loadData(){
  try{
    const res = await fetch('./data/odds.json?v=' + Date.now());
    const data = await res.json();
    currentMatches = data.matches || [];

    document.getElementById('status').innerHTML = `✔ 已加载（${data.updated_at || '无时间'}）`;
    document.getElementById('kpiUpdated').textContent = (data.updated_at || '--').slice(11,16) || '--';
    document.getElementById('kpiBudget').textContent = parseFloat(document.getElementById('budget').value || '200');

    renderPool();
    analyze();
    updateSnapshot(currentMatches);
  }catch(e){
    document.getElementById('status').innerHTML = '❌ 后台数据读取失败';
  }
}

function analyze(){
  const budget = parseFloat(document.getElementById('budget').value || '200');
  const singleMatch = document.getElementById('singleMatch').value.trim();

  const filtered = currentMatches.filter(m => selectedMatchIds.includes(m.id));
  const results = filtered.map(m => antiBookieAnalyze(m, singleMatch))
    .sort((a,b) => b.score - a.score);

  document.getElementById('kpiBudget').textContent = budget;
  document.getElementById('overview').innerHTML = renderOverview(results);
  document.getElementById('matches').innerHTML = renderMatches(results);
  document.getElementById('bets').innerHTML = renderBets(results, budget, singleMatch);
}

document.getElementById('budget').addEventListener('input', analyze);
document.getElementById('singleMatch').addEventListener('input', analyze);
document.getElementById('dayLabel').addEventListener('input', analyze);

renderStats();
setInterval(loadData, 30000);
loadData();
</script>
</body>
</html>
