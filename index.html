<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投注助手 V4</title>

<style>
body{
  margin:0;
  background:#0b1220;
  color:#fff;
  font-family:-apple-system;
}

.app{
  max-width:430px;
  margin:auto;
  padding:16px;
}

.title{
  font-size:22px;
  font-weight:bold;
  margin-bottom:12px;
}

.card{
  background:#121a2b;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

.input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

.btn{
  margin-top:12px;
  background:#3b82f6;
  padding:14px;
  text-align:center;
  border-radius:12px;
  font-size:16px;
}

.green{color:#4ade80}
.yellow{color:#facc15}
.red{color:#f87171}
</style>
</head>

<body>

<div class="app">

<div class="title">🔥 投注助手 V4（实战版）</div>

<div class="card">
<div>输入赔率</div>

<input class="input" id="odds1" placeholder="主胜赔率">
<input class="input" id="odds2" placeholder="平局赔率">
<input class="input" id="odds3" placeholder="客胜赔率">

<div class="btn" onclick="analyze()">开始分析</div>
</div>

<div class="card" id="result">
等待分析...
</div>

</div>

<script>

function analyze(){

let o1 = parseFloat(document.getElementById('odds1').value)
let o2 = parseFloat(document.getElementById('odds2').value)
let o3 = parseFloat(document.getElementById('odds3').value)

if(!o1 || !o2 || !o3){
  alert("请输入完整赔率")
  return
}

let p1 = 1/o1
let p2 = 1/o2
let p3 = 1/o3

let sum = p1+p2+p3

p1/=sum
p2/=sum
p3/=sum

let max = Math.max(p1,p2,p3)

let result = ""
if(max === p1) result = "胜"
if(max === p2) result = "平"
if(max === p3) result = "负"

let score = Math.round(max*100)

// 风险判断
let risk = ""
let riskColor = ""

if(score >= 65){
  risk = "低风险（稳）"
  riskColor = "green"
}else if(score >= 55){
  risk = "中风险"
  riskColor = "yellow"
}else{
  risk = "高风险（不建议单买）"
  riskColor = "red"
}

// 投注建议
let money = Math.round(score * 2)

// 串关建议
let combo = ""
if(score >= 65){
  combo = "适合做串关主线"
}else if(score >= 55){
  combo = "可做辅助串关"
}else{
  combo = "仅建议防守或放弃"
}

document.getElementById("result").innerHTML = `
<div class="${riskColor}">推荐：${result}</div>
<div>命中率：${score}%</div>
<div class="${riskColor}">风险：${risk}</div>
<div>建议下注：${money} 元</div>
<div>串关建议：${combo}</div>
`

}

</script>

</body>
</html>
